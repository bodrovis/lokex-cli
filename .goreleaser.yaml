version: 2

project_name: lokex-cli

before:
  hooks:
    - go mod verify

builds:
  - id: cli
    main: .
    binary: lokex-cli
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X github.com/bodrovis/lokex-cli/cmd.version={{ .Version }}"
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm

  - id: wasm
    main: .
    binary: lokex-cli
    env:
      - CGO_ENABLED=0
    goos: [js]
    goarch: [wasm]

upx:
  - ids: [cli]
    enabled: true
    compress: best
    lzma: true
    brute: false
    goos:
      - linux
      - windows

archives:
  - id: default
    ids: [cli]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  draft: false

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"